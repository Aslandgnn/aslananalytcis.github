<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayıt Formu Firebase</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  // Firebase yapılandırması
  const firebaseConfig = {
    apiKey: "AIzaSyBJbHel4phZ8-A5J0JlzmapxfldmsCHxVA",
    authDomain: "aslana-fbf15.firebaseapp.com",
    projectId: "aslana-fbf15",
    storageBucket: "aslana-fbf15.firebasestorage.app",
    messagingSenderId: "782134975632",
    appId: "1:782134975632:web:1216eee4cb2935ffb5cc15"
  };

  // Firebase başlat
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Form submit işlemi
  window.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("registerForm");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          alert("Kayıt başarılı!");
          form.reset();
        })
        .catch((error) => {
          alert("Hata: " + error.message);
        });
    });
  });
</script>
</head>
<body>
<h2>Kayıt Ol</h2>

<form id="registerForm">
  <input type="text" id="name" placeholder="Adınız" required><br><br>
  <input type="email" id="email" placeholder="E-posta" required><br><br>
  <input type="password" id="password" placeholder="Şifre" required><br><br>
  <button type="submit">Kayıt Ol</button>
</form>

</body>
</html>
